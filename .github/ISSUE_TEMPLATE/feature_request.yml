name: Feature request
description: Suggest a product improvement for The Foundry
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow, subscription pain, or user need should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should The Foundry do?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Screenshots, examples, edge cases, or accessibility notes.
